writer:
  draft:
    prelude: "请按以下结构撰写：Claim → Evidence → Warrant → Transition"
    constraints:
      - "每段不超过 200 字"
      - "引用使用 [N] 格式"
      - "每段首句为主题句"
    extra_instructions: ""
  polish:
    prelude: "只改表达不改观点，消除 AI 痕迹"
    constraints:
      - "不删除论据"
      - "不改变数据"
      - "不新增观点"
  summary:
    prelude: "生成结构化摘要"
    constraints:
      - "包含目的/方法/结果/结论四要素"
      - "必须含具体数字"
      - "150-300 字"
  competition-draft:
    prelude: "按数学建模竞赛论文规范撰写"
    constraints:
      - "严格遵循竞赛论文7章结构"
      - "每章需有明确建模逻辑"
      - "结果必须包含定量分析"

reviewer:
  research:
    prelude: "按 research 模式权重评审"
    weights: {创新性: 20, 方法合理性: 30, 实验充分性: 25, 写作质量: 15, 逻辑连贯性: 10}
  competition:
    prelude: "按 competition 模式权重评审"
    weights: {创新性: 35, 逻辑: 25, 呈现: 15, 严谨性: 15, 格式: 10}

planner:
  research:
    prelude: "设计科研论文大纲"
    constraints:
      - "每章 goal 必须说明与核心贡献的关系"
      - "方法章与实验章必须对应"
  competition:
    prelude: "设计竞赛论文大纲"
    constraints:
      - "必须包含模型假设与符号说明"
      - "求解过程要有完整的推导链"

researcher:
  default:
    prelude: "执行文献调研任务"
    constraints:
      - "所有文献必须标注出处"
      - "空白分析必须有文献依据"
