name: full-research
description: 完整版科研论文（调研→大纲→初稿→摘要→审稿→修改→格式化→导出）
category: research
domain: general

stageTasks:
  research: "分析选题方向：${topic}。生成研究简报。"
  skeleton: "基于 research-brief.md / problem-analysis.md 设计论文大纲。选题：${topic}。"
  draft: "基于 outline 逐章撰写正文。"
  summary: "基于全文生成结构化摘要。"
  review: "以审稿人视角审视论文，输出审稿报告（含完整性附录）。"
  revise: "基于审稿意见润色论文，只改表达不改观点。"
  format: "格式化论文，应用 GB/T 7714 参考文献规范。"
  figure: "基于正文内容生成学术图表代码并渲染。"
  export: "将论文转为 LaTeX 并编译 PDF。"
  evolve: "分析评审报告，提取失败模式，自动改进 prompt 文件。"

stages:
  - id: contribution-refinement
    agent: contribution-architect
    output: research/contribution-statement.md
    confirm: true

  - id: research
    agent: researcher
    task: "分析选题方向：${topic}。生成研究简报。"
    output: research/research-brief.md
    confirm: true

  - id: literature-synthesis
    agent: researcher
    task_prefix: "subtask: literature-synthesis"
    input:
      brief: research/research-brief.md
      contribution: research/contribution-statement.md
    output: research/literature-synthesis.md

  - id: skeleton
    agent: planner
    task_prefix: "mode: research"
    task: "基于 research-brief.md / problem-analysis.md 设计论文大纲。选题：${topic}。"
    input:
      brief: research/research-brief.md
    output: drafts/outline-v1.md
    confirm: true

  - id: draft
    agent: writer
    task_prefix: "subtask: draft"
    task: "基于 outline 逐章撰写正文。"
    sequential: true
    chapters: [1, 2, 3, 4, 5]
    input:
      outline: drafts/outline-v1.md
      memory: drafts/consistency-memory.md
    output: drafts/draft-v1.md
    qualityCheck: true
    qualityRetries: 1
    minWords: 8000

  - id: summary
    agent: writer
    task_prefix: "subtask: summary"
    task: "基于全文生成结构化摘要。"
    input:
      draft: drafts/draft-v1.md
    output: drafts/summary.md

  - id: review
    agent: reviewer
    task_prefix: "mode: research"
    task: "以审稿人视角审视论文，输出审稿报告（含完整性附录）。"
    input:
      draft: drafts/draft-v1.md
    output: output/review-report.md
    ensemble: true

  - id: evolve
    agent: _system
    type: evolve
    task: "分析评审报告，提取失败模式，自动改进 prompt 文件。"
    input:
      review: output/review-report.md
    output: output/evolution-report.md

  - id: revise
    agent: writer
    task_prefix: "subtask: polish"
    task: "基于审稿意见润色论文，只改表达不改观点。"
    input:
      draft: drafts/draft-v1.md
      review: output/review-report.md
    output: drafts/draft-v2.md
    condition: "review.decision != 'Accept'"
    qualityCheck: true
    qualityRetries: 1

  - id: figure
    agent: formatter
    task_prefix: "subtask: figure"
    task: "基于正文内容生成学术图表代码并渲染。"
    input:
      draft: drafts/draft-v2.md
    output: figures/

  - id: format
    agent: formatter
    task_prefix: "subtask: format"
    task: "格式化论文，应用 GB/T 7714 参考文献规范。"
    input:
      draft: drafts/draft-v2.md
    output: output/paper.md
    confirm: true

  - id: export
    agent: formatter
    task_prefix: "subtask: export"
    task: "将论文转为 LaTeX 并编译 PDF。"
    input:
      draft: output/paper.md
    output: output/latex/
